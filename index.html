<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bella.ai">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%231B2A4A'/%3E%3Ctext x='96' y='135' font-size='110' text-anchor='middle' fill='%23C8A96E' font-family='Georgia'%3EB%3C/text%3E%3C/svg%3E">
<title>Bella.ai</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   STAGE 1: SURGICAL COSMETICS (LAYOUT PRESERVED)
   ============================================================ */
:root {
  --navy: #1B2A4A;      /* Your Original Background */
  --cream: #FAF8F4;     /* Your Original Background */
  --gold: #C8A96E;      /* Logo Gold */
  --black: #000000;     /* New Bubble/Icon Background */
  --white: #FFFFFF;
  --active-red: #FF0000;
}

/* 1 & 2. ICONS & PROFILE ICONS - Black/Gold */
.sb-logo, .sb-user-av, .mav, .topbar-btn, .ibtn, .sbtn, .rec-btn, .mic-btn {
    background: var(--black) !important;
    border: 1px solid var(--gold) !important;
    color: var(--gold) !important;
    border-radius: 12px;
}
svg { stroke: var(--gold) !important; }

/* 3. HEADER BUBBLES - Black/Gold */
.chat-topbar, .sb-header {
    background: var(--black) !important;
    border-bottom: 1px solid var(--gold) !important;
    color: var(--gold) !important;
}

/* 4 & 5. SPEECH BUBBLES - Black/Gold */
.mbub {
    background: var(--black) !important;
    color: var(--gold) !important;
    border: 1px solid var(--gold) !important;
}

/* 6. SUGGESTION BUBBLES - Black/Gold */
.sug-chip {
    background: var(--black) !important;
    border: 1px solid var(--gold) !important;
    color: var(--gold) !important;
}

/* 8. TOGGLE BOUNDARY FIX */
.voice-toggle { display: flex; align-items: center; gap: 8px; padding-right: 20px !important; }
.toggle-sw {
    width: 36px; height: 20px; background: #1a1a1a; 
    border: 1px solid var(--gold); border-radius: 10px; position: relative;
}
.toggle-sw::after {
    content: ''; position: absolute; width: 14px; height: 14px;
    background: var(--gold); border-radius: 50%; top: 2px; left: 2px;
}

/* ACTIVE REC/MIC STATE (Red/White) */
.rec-btn.active, .mic-btn.active {
    background: var(--active-red) !important;
    border-color: var(--white) !important;
    color: var(--white) !important;
}

/* RETAINING YOUR ORIGINAL ARCHITECTURE */
body.light-mode { background-color: var(--cream); }
#sidebar { background: var(--navy); border-right: 1px solid var(--gold); }
</style>
</head>
<body>

</body>
</html>

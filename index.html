<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bella.ai">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%23000000'/%3E%3Ctext x='96' y='135' font-size='110' text-anchor='middle' fill='%23C8A96E' font-family='Georgia'%3EB%3C/text%3E%3C/svg%3E">
<title>Bella.ai</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   REFINED STAGE 1: LUXURY LIGHT THEME (BLACK & GOLD)
   ============================================================ */
:root {
  --bg-pure: #000000;
  --gold: #C8A96E;
  --white: #FFFFFF;
  --active-red: #FF0000;
  --sidebar-w: 280px;
}

body, html { 
    margin: 0; padding: 0; height: 100dvh; 
    background-color: var(--bg-pure) !important; 
    color: var(--gold) !important;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
}

/* 1, 2, 3, 8. Icons, Buttons & Toggles */
.sb-logo, .sb-user-av, .mav, .topbar-btn, .ibtn, .sbtn, .rec-btn, .mic-btn {
    background: var(--bg-pure) !important;
    border: 1px solid var(--gold) !important;
    color: var(--gold) !important;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
}

/* REC & MIC ACTIVE STATE: Red Background / White Lettering */
.rec-btn.active, .mic-btn.active {
    background: var(--active-red) !important;
    border: 1px solid var(--white) !important;
    color: var(--white) !important;
}

/* TOGGLE FIX: RHS BOUNDARY */
.voice-toggle-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-right: 10px; /* Prevents overflow beyond boundary */
}
.toggle-sw {
    width: 36px; height: 20px;
    background: #111;
    border: 1px solid var(--gold);
    border-radius: 20px;
    position: relative;
    cursor: pointer;
    flex-shrink: 0;
}
.toggle-sw::after {
    content: '';
    position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px;
    background: var(--gold);
    border-radius: 50%;
    transition: 0.3s;
}
.toggle-sw.on::after { transform: translateX(16px); }

/* 4, 5, 6. Bubbles */
#msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
.mbub { 
    background: var(--bg-pure) !important; 
    color: var(--gold) !important; 
    border: 1px solid var(--gold) !important; 
    padding: 12px 16px; 
    border-radius: 18px; 
}
.sug-chip {
    background: var(--bg-pure) !important;
    border: 1px solid var(--gold) !important;
    color: var(--gold) !important;
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 12px;
}

/* Header & Sidebar */
.chat-topbar { border-bottom: 1px solid var(--gold); background: var(--bg-pure); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; }
#sidebar { width: var(--sidebar-w); background: var(--bg-pure); border-right: 1px solid var(--gold); position: fixed; height: 100%; transform: translateX(-100%); transition: 0.3s; z-index: 100; }
#sidebar.open { transform: translateX(0); }

/* Input Area */
.inp-area { padding: 15px 20px; border-top: 1px solid var(--gold); background: var(--bg-pure); }
.inp-box { border: 1px solid var(--gold); border-radius: 25px; display: flex; align-items: center; padding: 5px 15px; gap: 10px; }
#ti { flex: 1; background: transparent; border: none; color: var(--gold); outline: none; font-size: 15px; padding: 10px 0; }
</style>
</head>
<body>

<div id="sidebar">
    <div class="chat-topbar"><div class="sb-logo" style="width:32px; height:32px;">B</div><div>Bella.ai</div></div>
    <div style="padding: 20px;">
        <div style="font-size:11px; margin-bottom:12px;">PROFILES</div>
        <div style="display:flex; align-items:center; gap:12px; border:1px solid var(--gold); padding:10px; border-radius:12px;">
            <div class="sb-user-av" style="width:35px; height:35px;">S</div>
            <div><div style="font-weight:600; font-size:14px;">Savio Abraham</div><div style="font-size:11px;">Online</div></div>
        </div>
    </div>
</div>

<div style="display:flex; flex-direction:column; height:100dvh;">
    <header class="chat-topbar">
        <button class="topbar-btn" style="width:38px; height:38px;" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <div style="font-family:'Cormorant Garamond', serif; font-size:22px; font-weight:600;">Bella</div>
        <button class="topbar-btn" style="width:38px; height:38px;">☀️</button>
    </header>

    <div id="msgs"></div>

    <div class="inp-area">
        <div class="inp-box">
            <button class="rec-btn" id="rec-btn" style="width:35px; height:35px; font-size:10px; font-weight:700;" onclick="this.classList.toggle('active')">REC</button>
            <textarea id="ti" placeholder="Speak to Bella..." rows="1"></textarea>
            <button class="mic-btn" id="mic-btn" style="width:35px; height:35px;" onclick="this.classList.toggle('active')">🎤</button>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
            <div style="font-size:9px; opacity:0.7;">* Stage 1: Luxury Light Mode</div>
            <div class="voice-toggle-wrap">
                <span style="font-size:10px; font-weight:600;">Text</span>
                <div class="toggle-sw" onclick="this.classList.toggle('on')"></div>
                <span style="font-size:10px; font-weight:600;">Voice</span>
            </div>
        </div>
    </div>
</div>

<script>
// ALL YOUR ORIGINAL BACKEND AND IDENTITY LOGIC PRESERVED HERE
// No changes made to the JavaScript to ensure server move stability
</script>
</body>
</html>
